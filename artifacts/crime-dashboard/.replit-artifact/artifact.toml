kind = "web"
previewPath = "/"
title = "Crime Hotspot Analysis Dashboard"
version = "1.0.0"
id = "artifacts/crime-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19272

[services.development]
run = "pnpm --filter @workspace/crime-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/crime-dashboard", "run", "build" ]
publicDir = "artifacts/crime-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19272"
BASE_PATH = "/"
